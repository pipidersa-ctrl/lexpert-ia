<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Expert IA — Accès Privé</title>
<meta http-equiv="refresh" content="2;url=https://lexpert-ia-private.systeme.io/20c995e1">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
  .card{text-align:center;max-width:360px;width:100%}
  .spinner{width:40px;height:40px;border:3px solid rgba(251,191,36,.15);border-top-color:#fbbf24;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:1.125rem;font-weight:700;margin-bottom:6px}
  p{font-size:.8125rem;color:rgba(255,255,255,.45);margin-bottom:24px}
  .btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;transition:all .2s;box-shadow:0 4px 24px rgba(245,158,11,.3)}
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(245,158,11,.4)}
  .btn:active{transform:scale(.97)}
  .sub{font-size:.6875rem;color:rgba(255,255,255,.25);margin-top:16px}
</style>
</head>
<body>
<div class="card">
  <div class="spinner"></div>
  <h1>Redirection en cours...</h1>
  <p>Tu vas être redirigé vers la page de paiement sécurisée.</p>
  <a class="btn" href="https://lexpert-ia-private.systeme.io/20c995e1" onclick="window.location.href=this.href;return false;">Continuer vers le paiement &rarr;</a>
  <p class="sub">Paiement sécurisé via Systeme.io</p>
</div>
</body>
</html>
